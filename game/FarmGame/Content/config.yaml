# =============================================================================
# Game Configuration
# =============================================================================

# Logging: "debug" for development, "info" for release
log_level: "debug"

# Display settings
screen:
  width: 800
  height: 600

# Tile rendering
tile:
  size: 32

# Player defaults
player:
  move_speed: 4.0         # tiles per second
  color: "#FF4500"         # OrangeRed (body color)
  body_padding: 2         # pixels inset from tile edge
  indicator_size: 8       # direction indicator size in pixels
  jump_height: 12         # max vertical offset in pixels
  jump_duration: 0.4      # jump duration in seconds
  attack_duration: 0.3    # attack animation duration in seconds
  attack_range: 16        # attack effect length in pixels
  attack_width: 20        # attack effect width in pixels
  attack_color: "#FFD700" # Gold (attack effect color)
  max_hp: 20              # player starting/max HP
  strength: 2             # base STR (contributes to ATK)
  dexterity: 1            # base DEX (contributes to ATK)
  weapon_atk: 1           # base weapon ATK (added to STR+DEX)
  buff_percent: 0.0       # equipment/buff ATK% bonus (0.1 = +10%)
  crit_rate: 0.1          # critical hit chance (0.0 ~ 1.0)
  crit_damage: 1.5        # critical hit damage multiplier

# Game startup
game:
  start_map: "farm_home"
  title: "Farm Game"
  default_language: "en"

# Save settings
save:
  auto_save_interval: 60   # seconds between auto-saves (0 to disable)

# Combat settings
combat:
  damage_tick_duration_ms: 300   # damage is distributed over this duration
  defense_model: "subtraction"   # "subtraction" or "division"
  defense_constant: 100          # used by division model: ATK * (C / (C + DEF))
  damage_variance: 0.05          # random fluctuation range (0.05 = 95%~105%)
  flash_opacity: 0.01            # dark gray overlay opacity during damage (1% per spec)
  knockback_tiles: 1             # how many tiles an entity is pushed back on hit

# Entity info display (name + HP bar shown when player is nearby)
entity_info:
  proximity_tiles: 2            # show info when player is within this tile distance
  font_size: 20                 # entity name font size
  hp_font_size: 14              # HP text font size
  hp_bar_width: 40              # HP bar width in pixels
  hp_bar_height: 5              # HP bar height in pixels
  hp_bar_offset_y: 3            # gap between entity bottom and HP bar top
  name_offset_y: 5              # gap between entity top and name bottom

# HUD overlay settings
hud:
  toast:
    fade_in_ms: 200
    fade_out_ms: 300
    duration_ms: 2500
    max_toasts: 5
    font_size: 16
  map_transition:
    fade_in_ms: 300
    hold_ms: 800
    fade_out_ms: 500
    font_size: 32
