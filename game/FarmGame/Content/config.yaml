# =============================================================================
# Game Configuration
# =============================================================================

# Display settings
screen:
  width: 800
  height: 600

# Tile rendering
tile:
  size: 32

# Player defaults
player:
  move_speed: 4.0         # tiles per second
  color: "#FF4500"         # OrangeRed (body color)
  body_padding: 2         # pixels inset from tile edge
  indicator_size: 8       # direction indicator size in pixels

# Game startup
game:
  start_map: "farm_home"
  title: "Farm Game"
