metadata:
  item_id: "rock"
  display_name: "Rock"
  category: "natural_resource"

visuals:
  color: ""
  origin_point: "top_left"
  background:
    enabled: true
    display_mode: "stretch"
    offset_x: 0
    offset_y: 0
    states:
      normal:
        image_path: "Images/rocks/rock_normal"
      damaged:
        image_path: "Images/rocks/rock_damaged"
      dead:
        image_path: "Images/rocks/rock_dead"

physics:
  occupy_width: 1
  occupy_height: 1
  is_collidable: true

logic:
  default_effects: []
  action_handler: "rock_logic"
  max_health: 8
  defense: 2
  faction: "neutral"
  drops:
    - item: "stone"
      amount: 2
