  display_name: "Apple Tree"
  category: "natural_resource"

visuals:
  color: ""
  origin_point: "top_left"
  background:
    enabled: true
    display_mode: "stretch"
    offset_x: 0
    offset_y: 0
    states:
      normal:
        image_path: "Images/apple_trees/apple_tree_c_normal"
