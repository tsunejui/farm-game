        image_path: "Images/apple_trees/apple_tree_dead"

physics:
  occupy_width: 2
  occupy_height: 2
  is_collidable: true

logic:
  default_effects: []
  action_handler: "tree_logic"
  max_health: 12
  defense: 1
  faction: "neutral"
  drops:
    - item: "wood"
      amount: 3
