metadata:
  item_id: "tree"
  display_name: "Oak Tree"
  category: "natural_resource"

visuals:
  color: ""
  origin_point: "top_left"
  background:
    enabled: true
    display_mode: "stretch"
    offset_x: 0
    offset_y: 0
    states:
      normal:
        image_path: "Images/trees/tree_normal"
      damaged:
        image_path: "Images/trees/tree_damaged"
      dead:
        image_path: "Images/trees/tree_dead"

physics:
  occupy_width: 2
  occupy_height: 2
  is_collidable: true

logic:
  action_handler: "tree_logic"
  max_health: 12
  faction: "neutral"
  drops:
    - item: "wood"
      amount: 4
