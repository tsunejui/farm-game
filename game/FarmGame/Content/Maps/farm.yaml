name: Farm
description: A peaceful farmland with cross-shaped paths, a small dirt plot for crops, and two water ponds.
width: 40
height: 30
tile_size: 32
player_start: [10, 10]

tileset:
  name: farm_tiles
  tile_width: 32
  tile_height: 32

terrain_colors:
  grass: [34, 139, 34]
  dirt: [139, 119, 101]
  path: [210, 180, 140]
  sand: [238, 214, 175]

object_colors:
  water: [30, 144, 255]
  rock: [128, 128, 128]
  fence: [139, 90, 43]
  tree: [20, 100, 20]

# Default terrain that fills the entire map before regions are applied
default_terrain: grass

# Terrain tiles: walkable ground surface
# Each entry defines a type with optional properties and a list of rectangular regions
terrain:
  - type: path
    regions:
      - { x: 0, y: 14, w: 40, h: 2 }
      - { x: 20, y: 0, w: 2, h: 30 }
  - type: dirt
    properties: { is_plantable: true }
    regions:
      - { x: 8, y: 8, w: 6, h: 4 }

# Object tiles: impassable items placed on top of terrain
objects:
  - type: water
    properties: { is_water: true }
    regions:
      - { x: 30, y: 5, w: 5, h: 4 }
      - { x: 2, y: 22, w: 4, h: 4 }
