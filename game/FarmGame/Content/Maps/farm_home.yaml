metadata:
  map_id: "farm_home"
  display_name: "Starter Farm"

config:
  width: 60
  height: 40
  tile_size: 32
  default_terrain: grass
  player_start: [15, 19]

terrains:
  # Main east-west stone road — wider
  - terrain: "stone_road"
    regions:
      - { x: 0, y: 17, w: 20, h: 5 }
      - { x: 19, y: 16, w: 3, h: 1 }
      - { x: 21, y: 17, w: 15, h: 5 }
      - { x: 35, y: 16, w: 2, h: 1 }
      - { x: 36, y: 17, w: 24, h: 5 }
      # North-south crossroad
      - { x: 27, y: 0, w: 5, h: 17 }
      - { x: 27, y: 22, w: 5, h: 18 }
      - { x: 26, y: 8, w: 1, h: 3 }
      - { x: 32, y: 14, w: 1, h: 2 }

  # Farm dirt patches — varied irregular shapes
  - terrain: "dirt"
    regions:
      - { x: 10, y: 10, w: 7, h: 4 }
      - { x: 11, y: 14, w: 5, h: 3 }
      - { x: 9, y: 11, w: 1, h: 3 }
      - { x: 17, y: 11, w: 1, h: 2 }
      # Eastern patch
      - { x: 38, y: 7, w: 5, h: 3 }
      - { x: 39, y: 10, w: 3, h: 2 }
      # Southern patch
      - { x: 5, y: 30, w: 6, h: 4 }
      - { x: 6, y: 34, w: 4, h: 2 }

  # Worn path connectors
  - terrain: "path"
    regions:
      - { x: 14, y: 16, w: 3, h: 1 }
      - { x: 38, y: 6, w: 3, h: 1 }
      - { x: 5, y: 31, w: 3, h: 1 }

