  - item: "dummy"
    tile_x: 16
    tile_y: 20
  - item: "dummy"
    tile_x: 18
    tile_y: 20

  # === Signpost near portal ===
  - item: "signpost"
    tile_x: 34
    tile_y: 17
    properties:
      dialogue_lines:
        - "signpost_farm_portal_right"
        - "signpost_farm_portal_left"

  # === Portal to Black Forest ===
  - item: "portal"
    tile_x: 38
    tile_y: 14
    properties:
      target_map: "dark_forest"
      target_x: 26
      target_y: 23
