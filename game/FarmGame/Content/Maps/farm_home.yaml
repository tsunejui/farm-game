metadata:
  map_id: "farm_home"
  display_name: "Starter Farm"

config:
  width: 40
  height: 30
  tile_size: 32
  default_terrain: grass
  player_start: [10, 10]

terrains:
  # Main stone road — organic winding path
  - terrain: "stone_road"
    regions:
      - { x: 0, y: 14, w: 15, h: 2 }
      - { x: 14, y: 13, w: 3, h: 1 }
      - { x: 16, y: 14, w: 8, h: 2 }
      - { x: 23, y: 13, w: 2, h: 1 }
      - { x: 24, y: 14, w: 16, h: 2 }
      # North-south crossroad
      - { x: 19, y: 0, w: 2, h: 14 }
      - { x: 19, y: 16, w: 2, h: 14 }
      - { x: 18, y: 6, w: 1, h: 2 }
      - { x: 21, y: 10, w: 1, h: 2 }

  # Farm dirt patches — irregular plots
  - terrain: "dirt"
    regions:
      - { x: 7, y: 7, w: 5, h: 3 }
      - { x: 8, y: 10, w: 3, h: 2 }
      - { x: 6, y: 8, w: 1, h: 2 }
      - { x: 12, y: 8, w: 1, h: 1 }
      - { x: 25, y: 5, w: 3, h: 2 }
      - { x: 26, y: 7, w: 2, h: 1 }
      - { x: 3, y: 22, w: 4, h: 3 }
      - { x: 4, y: 25, w: 2, h: 1 }

  # Worn path connectors
  - terrain: "path"
    regions:
      - { x: 10, y: 12, w: 2, h: 2 }
      - { x: 25, y: 4, w: 2, h: 1 }
      - { x: 3, y: 21, w: 2, h: 1 }

entities:
  # === Water features ===
  - item: "water_body"
    tile_x: 30
    tile_y: 4
    properties:
      fill_width: 4
      fill_height: 3
  - item: "water_body"
    tile_x: 2
    tile_y: 24
    properties:
      fill_width: 3
      fill_height: 3

  # === Animated tree variants ===
  # Northwest grove
  - item: "oak_tree_a"
    tile_x: 2
    tile_y: 1
  - item: "pine_tree_b"
    tile_x: 5
    tile_y: 0
  - item: "oak_tree_c"
    tile_x: 1
    tile_y: 4

  # Northeast
  - item: "pine_tree_a"
    tile_x: 25
    tile_y: 1
  - item: "birch_tree_b"
    tile_x: 29
    tile_y: 2
  - item: "pine_tree_c"
    tile_x: 35
    tile_y: 0

  # Southeast
  - item: "oak_tree_b"
    tile_x: 35
    tile_y: 19
  - item: "apple_tree_a"
    tile_x: 32
    tile_y: 22

  # Southwest orchard
  - item: "apple_tree_b"
