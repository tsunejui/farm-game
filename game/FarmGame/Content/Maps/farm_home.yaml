  # === Flowers ===
  - item: "morning_glory"
    tile_x: 24
    tile_y: 10
  - item: "red_flower"
    tile_x: 26
    tile_y: 11
  - item: "chrysanthemum"
    tile_x: 28
    tile_y: 10
  - item: "red_flower"
