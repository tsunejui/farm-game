# =============================================================================
# Map Example — Reference for all available fields
#
# Coordinate system: (0,0) = top-left, x → right, y → down
# All x, y, w, h values are in tile units
# =============================================================================

# --- Metadata ----------------------------------------------------------------
metadata:
  map_id: "example_map"
  display_name: "Example Map"

# --- Config ------------------------------------------------------------------
config:
  width: 20
  height: 15
  tile_size: 32
  default_terrain: grass           # terrain_id used to fill entire map first
  player_start: [5, 7]

# --- Terrains ----------------------------------------------------------------
# Ground tiles painted over the default terrain.
# Each entry references a terrain_id defined in Content/Terrains/<id>.yaml.
# Properties from the terrain definition are applied automatically.
# Instance-specific property overrides can be added here.
#
# Fields:
#   terrain    — terrain_id (must match a Terrains/*.yaml file)
#   properties — (optional) instance-specific overrides
#   regions    — list of rectangles { x, y, w, h }
terrains:
  - terrain: "path"
    regions:
      - { x: 0, y: 7, w: 20, h: 1 }

  - terrain: "dirt"
    regions:
      - { x: 12, y: 2, w: 4, h: 3 }

  - terrain: "sand"
    regions:
      - { x: 1, y: 11, w: 4, h: 1 }

# --- Entities ----------------------------------------------------------------
# Items placed on the map. Each entry references an item_id defined in
# Content/Items/<item_id>.yaml.
#
# Fields:
#   item       — item_id (must match an Items/*.yaml file)
#   tile_x     — x position in tile coordinates
#   tile_y     — y position in tile coordinates
#   properties — (optional) instance-specific overrides
entities:
  - item: "water_body"
    tile_x: 1
    tile_y: 12
    properties:
      fill_width: 3
      fill_height: 2

  - item: "tree"
    tile_x: 8
    tile_y: 1

  - item: "tree"
    tile_x: 16
    tile_y: 10

  - item: "rock"
    tile_x: 10
    tile_y: 5

  - item: "fence"
    tile_x: 11
    tile_y: 1
  - item: "fence"
    tile_x: 16
    tile_y: 1
  - item: "fence"
    tile_x: 11
    tile_y: 5
  - item: "fence"
    tile_x: 16
    tile_y: 5

  - item: "portal"
    tile_x: 19
    tile_y: 7
    properties:
      target_map: "farm_home"
      spawn_tile_x: 1
      spawn_tile_y: 14
