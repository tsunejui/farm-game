name: Farm
description: A peaceful farmland with cross-shaped paths, a small dirt plot for crops, and two water ponds.
width: 40
height: 30
tile_size: 32
player_start: [10, 10]

tileset:
  name: farm_tiles
  tile_width: 32
  tile_height: 32

# Symbol legend: maps characters to tile definitions with custom properties
legend:
  ".": { layer: terrain, type: grass }
  "#": { layer: terrain, type: dirt, properties: { is_plantable: true } }
  "=": { layer: terrain, type: path }
  ",": { layer: terrain, type: sand }
  "~": { layer: object, type: water, properties: { is_water: true } }
  "O": { layer: object, type: rock }
  "|": { layer: object, type: fence }
  "T": { layer: object, type: tree }

# Colors for rendering (RGB 0-255)
terrain_colors:
  grass: [34, 139, 34]
  dirt: [139, 119, 101]
  path: [210, 180, 140]
  sand: [238, 214, 175]

object_colors:
  water: [30, 144, 255]
  rock: [128, 128, 128]
  fence: [139, 90, 43]
  tree: [20, 100, 20]

# Symbol matrices (each row = one line, length = width)
# Terrain layer: ground surface (always walkable)
# Object layer:  impassable items ("." = empty/no object)
